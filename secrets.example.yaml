# secrets.example.yaml — the SHAPE of your secrets, with NO real values.
#
# Copy to secrets.yaml, fill in real values, and SOPS-encrypt it:
#   cp secrets.example.yaml secrets.yaml
#   sops secrets.yaml            # edits in-place, encrypted at rest
# Then point fleet.nix's `secrets.defaultSopsFile = ./secrets.yaml;`.
#
# secrets.yaml (the encrypted real one) is gitignored. NEVER commit plaintext
# secrets. Keys are referenced by PATH from fleet.nix (e.g. a WireGuard
# privateKey = "server-01/wg/key"), never inlined.
#
# Naming: "category/name" with forward slashes.
admin:
  ssh:
    private-key: REPLACE_ME
operator:
  ssh:
    private-key: REPLACE_ME
automation:
  ssh:
    private-key: REPLACE_ME
# server-01:
#   wg:
#     key: REPLACE_ME
